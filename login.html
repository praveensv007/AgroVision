</head>

    <!--================ LOGIN SECTION ================-->
<!--================ LOGIN & REGISTER SECTION ================-->

<section class="login-section">

    <div class="container">

        <div class="row justify-content-center align-items-center min-vh-100">

            <div class="col-lg-6 col-md-8">

                <div class="glass-card login-card p-5">

                    <!-- LOGIN FORM -->

                    <div id="loginBox">

                        <div class="text-center mb-4">

                            <i class="bi bi-person-circle display-2 text-success"></i>

                            <h2 class="fw-bold mt-3">Welcome Back</h2>

                            <p class="text-muted">
                                Login to AgroVision Portal
                            </p>

                        </div>

                        <form id="loginForm">

                            <div class="mb-3">

                                <label class="form-label">
                                    Email Address
                                </label>

                                <input type="email" class="form-control"
                                    placeholder="Enter your email" required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Password
                                </label>

                                <input type="password"
                                    class="form-control"
                                    placeholder="Enter your password"
                                    required>

                            </div>

                            <div class="d-flex justify-content-between mb-4">

                                <div class="form-check">

                                    <input class="form-check-input" type="checkbox">

                                    <label class="form-check-label">
                                        Remember Me
                                    </label>

                                </div>

                                <a href="#" >
                                    Forgot Password?
                                </a>

                            </div>

                            <button type="submit"
                                class="btn btn-success w-100 btn-lg rounded-pill">

                                <i class="bi bi-box-arrow-in-right"></i>

                                Login

                            </button>

                        </form>

                        <hr>

                        <div class="text-center">

                            <p class="mb-2">
                                Don't have an account?
                            </p>

                            <button class="btn btn-success rounded-pill"
                                id="showRegister">

                                Create Account

                            </button>

                        </div>

                    </div>

                    <!-- REGISTER FORM -->

                    <div id="registerBox" style="display:none;">

                        <div class="text-center mb-4">

                            <i class="bi bi-person-plus-fill display-2 text-success"></i>

                            <h2 class="fw-bold mt-3">
                                Create Account
                            </h2>

                            <p class="text-muted">
                                Join AgroVision Community
                            </p>

                        </div>

                        <form id="registerForm">

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Full Name
                                    </label>

                                    <input type="text"
                                        class="form-control"
                                        placeholder="Enter your name"
                                        required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Mobile Number
                                    </label>

                                    <input type="tel"
                                        class="form-control"
                                        placeholder="9876543210"
                                        pattern="[0-9]{10}"
                                        required>

                                </div>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Email Address
                                </label>

                                <input type="email"
                                    class="form-control"
                                    placeholder="Enter your email"
                                    required>

                            </div>

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Password
                                    </label>

                                    <input type="password"
                                        class="form-control"
                                        placeholder="Create password"
                                        required>

                                </div>

                                <div class="col-md-6 mb-4">

                                    <label class="form-label">
                                        Confirm Password
                                    </label>

                                    <input type="password"
                                        class="form-control"
                                        placeholder="Confirm password"
                                        required>

                                </div>

                            </div>

                            <button class="btn btn-success btn-lg w-100 rounded-pill">

                                <i class="bi bi-person-plus-fill"></i>

                                Register

                            </button>

                        </form>

                        <hr>

                        <div class="text-center">

                            <p class="mb-2">

                                Already have an account?

                            </p>

                            <button class="btn btn-success rounded-pill"
                                id="showLogin">

                                Login Here

                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
